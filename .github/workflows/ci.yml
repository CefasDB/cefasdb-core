name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...

  test:
    name: race tests
    runs-on: ubuntu-latest
    # Phase 0a — surface failures without blocking merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test -race -shuffle=on
        run: go test -race -count=1 -shuffle=on -covermode=atomic -coverpkg=./... -coverprofile=cover.out ./...
      - name: upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
          if-no-files-found: ignore

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    # Phase 0a — warn-only; gates flip to error in phase-0f.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.2
          args: --timeout=5m

  coverage:
    name: coverage thresholds
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: coverage
        continue-on-error: true
      - name: install go-test-coverage
        run: go install github.com/vladopajic/go-test-coverage/v2@latest
      - name: enforce thresholds
        run: go-test-coverage --config .testcoverage.yml

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: securego/gosec@master
        with:
          args: -severity=medium -confidence=medium ./...
