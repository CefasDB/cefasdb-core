name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...

  test:
    name: race tests (warn-only — phase 0a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test -race -shuffle=on
        continue-on-error: true
        run: go test -race -count=1 -shuffle=on -covermode=atomic -coverpkg=./... -coverprofile=cover.out ./...
      - name: upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
          if-no-files-found: ignore

  integration:
    name: integration tests (warn-only — phase 2a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test -tags=integration -race
        continue-on-error: true
        run: go test -tags=integration -race -count=1 -timeout=15m ./...

  lint:
    name: golangci-lint (warn-only — phase 0a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        continue-on-error: true
        with:
          version: v2.7.2
          args: --timeout=5m

  coverage:
    name: coverage thresholds (warn-only — phase 0a)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: coverage
        continue-on-error: true
      - name: install go-test-coverage
        run: go install github.com/vladopajic/go-test-coverage/v2@latest
      - name: enforce thresholds
        continue-on-error: true
        run: go-test-coverage --config .testcoverage.yml

  vulncheck:
    name: govulncheck (warn-only — phase 0a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        continue-on-error: true
        run: govulncheck ./...

  gosec:
    name: gosec (warn-only — phase 0a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: securego/gosec@master
        continue-on-error: true
        with:
          args: -severity=medium -confidence=medium ./...

  mutation:
    name: gremlins unleash (warn-only — phase 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # gremlins needs the previous commit to detect changed files
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      - name: gremlins unleash
        continue-on-error: true
        run: |
          gremlins unleash ./pkg/core/... \
            --workers 2 \
            --output mutation-report.json
      - name: upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.json
          if-no-files-found: ignore
