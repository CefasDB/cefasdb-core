name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN_NAME: cefas
  NPM_PACKAGE: "@osvaldoandrade/cefas"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./cmd/cefas-cli/...

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="${RELEASE_TAG#v}"
          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              ext=""
              if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
              echo "Building $GOOS/$GOARCH"
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath \
                -ldflags "-s -w -X github.com/osvaldoandrade/cefas/cmd/cefas-cli/cmd.Version=${VERSION}" \
                -o "dist/${BIN_NAME}-${GOOS}-${GOARCH}${ext}" \
                ./cmd/cefas-cli
            done
          done

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          shasum -a 256 dist/* > dist/SHA256SUMS.txt

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@osvaldoandrade"

      - name: Publish npm package (npmjs)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Missing secret NPM_TOKEN (required to publish to registry.npmjs.org)." >&2
            exit 1
          fi

          VERSION="${RELEASE_TAG#v}"
          cd npm
          npm version --no-git-tag-version "$VERSION"
          npm pack --dry-run --registry=https://registry.npmjs.org --@osvaldoandrade:registry=https://registry.npmjs.org
          npm publish --access public --provenance --registry=https://registry.npmjs.org --@osvaldoandrade:registry=https://registry.npmjs.org

      - name: Smoke test npm install
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          PREFIX="${RUNNER_TEMP}/cefas-npm-smoke"

          for attempt in {1..12}; do
            if npm view "${NPM_PACKAGE}@${VERSION}" version --registry=https://registry.npmjs.org --@osvaldoandrade:registry=https://registry.npmjs.org >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Package ${NPM_PACKAGE}@${VERSION} was not visible on npm after waiting." >&2
              exit 1
            fi
            sleep 10
          done

          npm install --global --prefix "$PREFIX" "${NPM_PACKAGE}@${VERSION}" --registry=https://registry.npmjs.org --@osvaldoandrade:registry=https://registry.npmjs.org
          "$PREFIX/bin/${BIN_NAME}" version
