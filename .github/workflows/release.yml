name: Auto Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to reuse (e.g. v0.1.0). Leave empty to create the next patch tag."
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: autorelease-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN_NAME: cefas
  NPM_PACKAGE: "@osvaldoandrade/cefas"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          requested="${{ github.event.inputs.tag || '' }}"
          if [ -n "$requested" ]; then
            if ! [[ "$requested" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "invalid release tag: $requested" >&2
              exit 1
            fi
            if ! git rev-parse "$requested" >/dev/null 2>&1; then
              echo "release tag does not exist: $requested" >&2
              exit 1
            fi
            git checkout "$requested"
            tag="$requested"
            ver="${tag#v}"
            create_tag=false
          else
            latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V | tail -n 1 || true)"
            if [ -z "$latest" ]; then
              major=0
              minor=0
              patch=0
            else
              IFS='.' read -r major minor patch <<< "$latest"
            fi

            if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
              echo "invalid latest tag version: $latest" >&2
              exit 1
            fi

            new_patch=$((patch + 1))
            ver="${major}.${minor}.${new_patch}"
            tag="v${ver}"

            while git rev-parse "$tag" >/dev/null 2>&1; do
              new_patch=$((new_patch + 1))
              ver="${major}.${minor}.${new_patch}"
              tag="v${ver}"
            done
            create_tag=true
          fi

          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "create_tag=$create_tag" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test CLI
        run: go test ./cmd/cefas-cli/...

      - name: Build CLI binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="${{ steps.vars.outputs.ver }}"
          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              ext=""
              if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
              echo "Building ${BIN_NAME} ${GOOS}/${GOARCH}"
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath \
                  -ldflags "-s -w -X github.com/osvaldoandrade/cefas/cmd/cefas-cli/cmd.Version=${VERSION}" \
                  -o "dist/${BIN_NAME}-${GOOS}-${GOARCH}${ext}" \
                  ./cmd/cefas-cli
            done
          done

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create and push tag
        if: ${{ steps.vars.outputs.create_tag == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Missing secret NPM_TOKEN (required to publish to registry.npmjs.org)." >&2
            exit 1
          fi

          VERSION="${{ steps.vars.outputs.ver }}"
          cd npm
          npm version --no-git-tag-version "$VERSION"
          npm pack --dry-run
          npm publish --access public --provenance

      - name: Smoke test npm install
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.ver }}"
          PREFIX="${RUNNER_TEMP}/cefas-npm-smoke"

          for attempt in {1..12}; do
            if npm view "${NPM_PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Package ${NPM_PACKAGE}@${VERSION} was not visible on npm after waiting." >&2
              exit 1
            fi
            sleep 10
          done

          npm install --global --prefix "$PREFIX" "${NPM_PACKAGE}@${VERSION}"
          "$PREFIX/bin/${BIN_NAME}" version
