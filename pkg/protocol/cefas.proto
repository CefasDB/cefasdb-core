// ===== Rerank / MMR (issue #244) =====
//
// RerankCandidate is one input row to the MMR re-ranker. `distance`
// carries the upstream relevance distance (smaller-is-better, the
// TopK convention); the engine rank-normalises it internally so the
// scoring rule is invariant to the distance operator's absolute
// scale. `field` on the request points at the attribute on `item`
// the similarity function reads — typically the embedding vector.
message RerankCandidate {
  Item   item     = 1;
  double distance = 2;
}

// RerankRequest carries the inputs to the MMR diversification
// operator. `field` defaults to "embedding" when empty.
// `distance_operator` defaults to the metric the ANN index uses for
// `table`/`field` (when one is registered) and falls back to
// "cosine". `lambda` is the relevance/diversity trade-off in [0, 1].
// `target_size` caps the returned slate; values larger than the
// input set are clamped to len(candidates).
message RerankRequest {
  string                   table             = 1;
  string                   field             = 2;
  string                   distance_operator = 3;
  double                   lambda            = 4;
  int32                    target_size       = 5;
  repeated RerankCandidate candidates        = 6;
}

message RerankResponse {
  // Selected slate, in pick order. Length is min(target_size,
  // len(candidates)).
  repeated RerankCandidate slate = 1;
  // DistanceOperator echoes the resolved operator name so callers
  // can confirm the default they got when they passed an empty one.
  string distance_operator = 2;
}

// ===== Pipeline operators (#247, #248) =====

message PipelineStageTiming {
  string stage        = 1;
  int32  input_count  = 2;
  int32  output_count = 3;
  double elapsed_ms   = 4;
  repeated string reason_codes = 5;
}

message RecommendRequest {
  string table             = 1;
  string field             = 2;
  string distance_operator = 3;
  AttributeValue target    = 4;
  // candidate_limit controls the retrieval fan-out before filter and
  // diversification. Defaults to max(limit*4, limit, 100).
  int32 candidate_limit    = 5;
  // SQL predicate evaluated after retrieval; empty disables the stage.
  string filter_expression = 6;
  // Final cap after optional MMR/dedup/freqcap.
  int32 limit              = 7;
  // MMR is enabled by default when limit < candidate_limit.
  double mmr_lambda        = 8;
  bool disable_diversify   = 9;
  string dedup_scope       = 10;
  string dedup_key_field   = 11;
  int64  dedup_ttl_seconds = 12;
  string freqcap_scope     = 13;
  string freqcap_key_field = 14;
  int32  freqcap_limit     = 15;
  int64  freqcap_window_seconds = 16;
}

message RecommendRow {
  Item   item     = 1;
  double distance = 2;
  string reason   = 3;
}

message RecommendResponse {
  repeated RecommendRow rows = 1;
  repeated PipelineStageTiming stages = 2;
  repeated string reason_codes = 3;
}

message NBAAction {
  string action_id = 1;
  bool   disabled  = 2;
  string reason    = 3;
  map<string, string> context = 4;
}

message NextBestActionRequest {
  string bandit_id = 1;
  string user_id   = 2;
  repeated NBAAction actions = 3;
  string fallback_action_id = 4;
  map<string, string> context = 5;
  string cap_scope = 6;
  int32  cap_limit = 7;
  int64  cap_window_seconds = 8;
  int64  decision_ttl_seconds = 9;
}

message NextBestActionResponse {
  string decision_id = 1;
  string action_id   = 2;
  bool   fallback    = 3;
  repeated string reason_codes = 4;
  repeated PipelineStageTiming stages = 5;
}

message RecordRewardRequest {
  string decision_id = 1;
  // bandit_id/action_id are optional when decision_id is set; the
  // decision log is authoritative so rewards update the original arm.
  string bandit_id = 2;
  string action_id = 3;
  double reward    = 4;
  map<string, string> context = 5;
}
message RecordRewardResponse {
  string bandit_id = 1;
  string action_id = 2;
}

message DecisionRecord {
  string decision_id = 1;
  string bandit_id   = 2;
  string user_id     = 3;
  string action_id   = 4;
  bool   fallback    = 5;
  repeated string reason_codes = 6;
  map<string, string> context = 7;
  int64 created_at_unix = 8;
  int64 expires_at_unix = 9;
}

message GetDecisionRequest {
  string decision_id = 1;
}
message GetDecisionResponse {
  bool found = 1;
  DecisionRecord decision = 2;
}

// ===== Bandit (issue #246) =====

// BanditArmSpec describes one arm at create time. Family selects the
// posterior model: "beta-bernoulli" (default) or "gaussian". Prior
// parameters default sensibly when zero (Alpha=Beta=1 for Bernoulli,
// Sigma=1 for Gaussian).
message BanditArmSpec {
  string arm_id = 1;
  string family = 2;
  double alpha  = 3;
  double beta   = 4;
  double mu     = 5;
  double sigma  = 6;
}

message BanditCreateRequest {
  string bandit_id = 1;
  // Strategy is "thompson" (default), "ucb1", or "epsilon-greedy".
  string strategy  = 2;
  repeated BanditArmSpec arms = 3;
  // Optional: epsilon for epsilon-greedy (defaults to 0.1).
  double epsilon   = 4;
  // Optional: C for UCB1 (defaults to sqrt(2)).
  double c         = 5;
}
message BanditCreateResponse {}

message BanditSampleRequest {
  string bandit_id = 1;
  // Optional context; v1 implementations ignore it. Reserved for
  // contextual bandit follow-up.
  map<string, string> context = 2;
  // n > 1 returns BatchSample.
  int32 n = 3;
}
message BanditSampleResponse {
  // Repeated so single-sample callers ignore extras; len() always
  // matches max(n, 1).
  repeated string arm_id = 1;
}

message BanditRewardRequest {
  string bandit_id = 1;
  string arm_id    = 2;
  double reward    = 3;
  map<string, string> context = 4;
}
message BanditRewardResponse {}

message BanditDescribeRequest {
  string bandit_id = 1;
}
message BanditArmStats {
  string arm_id  = 1;
  string family  = 2;
  double alpha   = 3;
  double beta    = 4;
  double mu      = 5;
  double sigma   = 6;
  int64  pulls   = 7;
  double rewards = 8;
  double mean    = 9;
}
message BanditDescribeResponse {
  string bandit_id = 1;
  string strategy  = 2;
  repeated BanditArmStats arms = 3;
}

// ===== Atomic update (issue #242) =====
//
// AtomicUpdate exposes the server-side read-modify-write primitive
// (counter / CAS) backed by internal/storage.DB.AtomicUpdate. The
// response carries the post-image so callers never need a follow-up
// GetItem to read what they just wrote.

service CefasAtomic {
  rpc AtomicUpdate(AtomicUpdateRequest) returns (AtomicUpdateResponse);
}

// AtomicActionKind selects the mutator applied to the attribute named
// in AtomicAction.attribute.
//
//   ATOMIC_SET         — overwrite attribute with `value` verbatim
//   ATOMIC_INCR_RETURN — atomically add `value` (must be numeric); the
//                        new value is reported in returned_values
//   ATOMIC_ADD_RETURN  — alias for ATOMIC_INCR_RETURN (DynamoDB-style
//                        vocabulary for the same primitive)
//   ATOMIC_APPLY       — evaluate `expression` against the prior item
//                        and assign the result to `attribute`. Grammar:
//                        numeric arithmetic (+ - * /), min(a,b),
//                        max(a,b), clamp(x,lo,hi).
enum AtomicActionKind {
  ATOMIC_ACTION_UNSPECIFIED = 0;
  ATOMIC_SET                = 1;
  ATOMIC_INCR_RETURN        = 2;
  ATOMIC_ADD_RETURN         = 3;
  ATOMIC_APPLY              = 4;
}

message AtomicAction {
  AtomicActionKind kind       = 1;
  string           attribute  = 2;
  AttributeValue   value      = 3;
  string           expression = 4; // ATOMIC_APPLY only
}

message AtomicUpdateRequest {
  string                       table     = 1;
  map<string, AttributeValue>  key       = 2;
  string                       condition = 3;
  map<string, AttributeValue>  binds     = 4;
  repeated AtomicAction        actions   = 5;
}

message AtomicUpdateResponse {
  // Post-image of the item after every action applied.
  map<string, AttributeValue>  item             = 1;
  // Per-action returned value, aligned with the request's `actions`.
  // For INCR_RETURN / ADD_RETURN / APPLY this is the new attribute
  // value; for SET it echoes the assigned value.
  repeated AttributeValue      returned_values  = 2;
  // True when the item did not exist prior to the call.
  bool                         created          = 3;
}
