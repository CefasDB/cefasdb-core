// cefas gRPC service definition. Wire format is independent of AWS
// DynamoDB; the shape mirrors it for ergonomic parity. Phase 1 omits
// transaction, batch, and conditional-write APIs — they land in Phase 2.

syntax = "proto3";

package cefas.v1;

option go_package = "github.com/osvaldoandrade/cefas/pkg/api/proto;cefaspb";

service Cefas {
  rpc CreateTable(CreateTableRequest) returns (CreateTableResponse);
  rpc DescribeTable(DescribeTableRequest) returns (DescribeTableResponse);
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);

  rpc PutItem(PutItemRequest) returns (PutItemResponse);
  rpc GetItem(GetItemRequest) returns (GetItemResponse);
  rpc DeleteItem(DeleteItemRequest) returns (DeleteItemResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
}

message AttributeValue {
  oneof value {
    string s = 1;
    string n = 2;          // canonical decimal text (arbitrary precision)
    bytes  b = 3;
    bool   bool_val = 4;
    bool   null_val = 5;   // true = explicit null
    StringSet ss = 6;
    StringSet ns = 7;
    BinarySet bs = 8;
    List l = 9;
    Map m = 10;
  }
}

message StringSet { repeated string values = 1; }
message BinarySet { repeated bytes  values = 1; }
message List      { repeated AttributeValue values = 1; }
message Map       { map<string, AttributeValue> values = 1; }

message KeySchema {
  string pk = 1;
  string sk = 2;
}

message TableDescriptor {
  string name = 1;
  KeySchema key_schema = 2;
  // GSI / spatial indexes land in later phases.
}

message CreateTableRequest  { TableDescriptor descriptor = 1; }
message CreateTableResponse { TableDescriptor descriptor = 1; }

message DescribeTableRequest  { string name = 1; }
message DescribeTableResponse { TableDescriptor descriptor = 1; }

message ListTablesRequest  {}
message ListTablesResponse { repeated TableDescriptor tables = 1; }

message PutItemRequest {
  string table = 1;
  map<string, AttributeValue> item = 2;
}
message PutItemResponse {}

message GetItemRequest {
  string table = 1;
  map<string, AttributeValue> key = 2;
}
message GetItemResponse {
  bool found = 1;
  map<string, AttributeValue> item = 2;
}

message DeleteItemRequest {
  string table = 1;
  map<string, AttributeValue> key = 2;
}
message DeleteItemResponse {}

message QueryRequest {
  string table = 1;
  AttributeValue pk_value = 2;
  // Optional SK range. When sk_low and sk_high are both unset, every
  // item under pk_value is returned.
  AttributeValue sk_low = 3;
  AttributeValue sk_high = 4;
  int32 limit = 5;
}
message QueryResponse {
  repeated Item items = 1;
}

message Item {
  map<string, AttributeValue> attributes = 1;
}
