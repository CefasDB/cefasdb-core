// cefas gRPC service definition.
//
// Wire format is independent of any third-party item store; the shape
// mirrors DynamoDB only as far as it makes ergonomic sense. Streaming
// reads (Query / Scan / SpatialQuery) keep server memory bounded for
// large result sets.

syntax = "proto3";

package cefas.v1;

option go_package = "github.com/osvaldoandrade/cefas/pkg/api/proto;cefaspb";

service Cefas {
  // Schema management.
  rpc CreateTable(CreateTableRequest) returns (CreateTableResponse);
  rpc DescribeTable(DescribeTableRequest) returns (DescribeTableResponse);
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);
  rpc DropTable(DropTableRequest) returns (DropTableResponse);

  // TTL configuration. The reaper already honours TableDescriptor.TTLAttribute;
  // these RPCs only mutate the catalog entry.
  rpc UpdateTimeToLive(UpdateTimeToLiveRequest) returns (UpdateTimeToLiveResponse);
  rpc DescribeTimeToLive(DescribeTimeToLiveRequest) returns (DescribeTimeToLiveResponse);

  // Item operations.
  rpc PutItem(PutItemRequest) returns (PutItemResponse);
  rpc GetItem(GetItemRequest) returns (GetItemResponse);
  rpc UpdateItem(UpdateItemRequest) returns (UpdateItemResponse);
  rpc DeleteItem(DeleteItemRequest) returns (DeleteItemResponse);

  // Bulk operations.
  rpc BatchWriteItem(BatchWriteItemRequest) returns (BatchWriteItemResponse);
  rpc BatchGetItem(BatchGetItemRequest) returns (BatchGetItemResponse);

  // Atomic multi-item transactions. v1 ships single-shard, single-table
  // atomicity via one pebble.Batch + one raft entry. Multi-shard 2PC is
  // out of scope.
  rpc TransactWriteItems(TransactWriteItemsRequest) returns (TransactWriteItemsResponse);
  rpc TransactGetItems(TransactGetItemsRequest) returns (TransactGetItemsResponse);

  // Query and scan stream rows so the server never materialises an
  // unbounded result set in memory.
  rpc Query(QueryRequest) returns (stream Item);
  rpc Scan(ScanRequest) returns (stream Item);
  rpc SpatialQuery(SpatialQueryRequest) returns (stream Item);

  // SQL surface — single statement per call. Affected_rows is set for
  // DDL/DML; rows is set for SELECT.
  rpc Sql(SqlRequest) returns (SqlResponse);

  // Cluster surface (no-ops in single-node mode).
  rpc ClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse);
  rpc AddVoter(AddVoterRequest) returns (AddVoterResponse);
  rpc RemoveServer(RemoveServerRequest) returns (RemoveServerResponse);
  rpc PlanPlacement(PlanPlacementRequest) returns (PlanPlacementResponse);
  rpc ApplyPlacement(ApplyPlacementRequest) returns (ApplyPlacementResponse);

  // Change Data Capture stream. Subscribers receive every committed
  // write in raft log order. Slow consumers may miss events when their
  // server-side ring buffer fills; at-least-once-in-order for live
  // consumers.
  rpc StreamChanges(StreamChangesRequest) returns (stream ChangeEvent);

  // Snapshot administration (PITR foundation).
  rpc ListSnapshots(ListSnapshotsRequest) returns (ListSnapshotsResponse);

  // Storage administration.
  rpc Compact(CompactRequest) returns (CompactResponse);

  // Admin-named backups (pebble.Checkpoint of the live keyspace,
  // catalogued under cefas/admin/backups/<name>).
  rpc CreateBackup(CreateBackupRequest) returns (CreateBackupResponse);
  rpc ListBackups(ListBackupsRequest) returns (ListBackupsResponse);
  rpc RestoreTableFromBackup(RestoreTableFromBackupRequest) returns (RestoreTableFromBackupResponse);

  // Plugin introspection.
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);
  rpc DescribePlugin(DescribePluginRequest) returns (DescribePluginResponse);

  // Plugin-backed index lifecycle (#158, #159, #160).
  rpc CreateIndex(CreateIndexRequest) returns (CreateIndexResponse);
  rpc DescribeIndex(DescribeIndexRequest) returns (DescribeIndexResponse);
  rpc RebuildIndex(RebuildIndexRequest) returns (RebuildIndexResponse);

  // Planner observability + top-K (#163, #164).
  rpc Explain(ExplainRequest) returns (ExplainResponse);
  rpc TopK(TopKRequest) returns (TopKResponse);

  // Cohort ops backed by the roaring + HLL plugins (#165, #166).
  rpc CohortCreate(CohortCreateRequest) returns (CohortCreateResponse);
  rpc CohortEstimate(CohortEstimateRequest) returns (CohortEstimateResponse);

  // Audience ops (#167-#170).
  rpc GeoAudience(GeoAudienceRequest) returns (stream Item);
  rpc Dedup(DedupRequest) returns (DedupResponse);
  rpc FreqCap(FreqCapRequest) returns (FreqCapResponse);
  rpc Aggregate(AggregateRequest) returns (AggregateResponse);
}

message StreamChangesRequest {
  // RaftIndex hints the lowest index the consumer cares about; the
  // server publishes events ≥ this index when its in-memory ring
  // buffer still has them, otherwise the consumer must fall back to
  // a snapshot restore.
  uint64 from_index = 1;
}

message ChangeEvent {
  enum Op {
    OP_UNSPECIFIED = 0;
    OP_PUT         = 1;
    OP_DELETE      = 2;
  }
  uint64 raft_index = 1;
  Op     op         = 2;
  bytes  key        = 3;
  bytes  value      = 4; // empty on OP_DELETE
}

message ListSnapshotsRequest {}
message ListSnapshotsResponse {
  repeated SnapshotMetadata snapshots = 1;
}
message SnapshotMetadata {
  string id            = 1; // raft snapshot id ("<term>-<index>-<unix>")
  uint64 raft_index    = 2;
  uint64 raft_term     = 3;
  int64  unix_seconds  = 4;
  int64  size_bytes    = 5;
}

message CompactRequest {
  string table        = 1;
  bytes  lower        = 2;
  bytes  upper        = 3;
  bool   parallelize  = 4;
}
message CompactResult {
  string table              = 1;
  bytes  lower              = 2;
  bytes  upper              = 3;
  int64  started_at_unix_ns = 4;
  int64  finished_at_unix_ns = 5;
  double elapsed_seconds    = 6;
  bool   parallelized       = 7;
  int64  before_l0_files    = 8;
  int64  after_l0_files     = 9;
  uint64 before_debt_bytes  = 10;
  uint64 after_debt_bytes   = 11;
}
message CompactResponse {
  repeated CompactResult results = 1;
}

message BackupDescriptor {
  string          name             = 1;
  int64           created_at_unix  = 2;
  repeated string tables           = 3;
  // Server-local on-disk path; clients use it only for diagnostics.
  string          checkpoint_path  = 4;
}

message CreateBackupRequest {
  string          name   = 1;
  // Optional: when empty the backup covers every table the catalog
  // knows about at creation time.
  repeated string tables = 2;
}
message CreateBackupResponse {
  BackupDescriptor backup = 1;
}

message ListBackupsRequest {}
message ListBackupsResponse {
  repeated BackupDescriptor backups = 1;
}

message RestoreTableFromBackupRequest {
  string backup_name        = 1;
  string source_table_name  = 2;
  string target_table_name  = 3;
}
message RestoreTableFromBackupResponse {
  string target_table_name = 1;
  int64  rows_copied       = 2;
}

// PluginDescriptor describes one registered plugin. The kind values
// match plugin.Kind.String() ("index" | "distance" | "estimator" |
// "audience"); state values match plugin.State.String() ("loaded" |
// "running" | "disabled" | "failed").
message PluginDescriptor {
  string name              = 1;
  string kind              = 2;
  string version           = 3;
  string description       = 4;
  string state             = 5;
  string last_error        = 6;
  int64  last_error_unix   = 7;
  int64  items_indexed     = 8;
  int64  started_at_unix   = 9;
}

message ListPluginsRequest {
  // kind narrows to a single plugin kind ("index" / "distance" /
  // "estimator" / "audience"). Empty = every kind.
  string kind = 1;
}
message ListPluginsResponse {
  repeated PluginDescriptor plugins = 1;
}

message DescribePluginRequest  { string name = 1; }
message DescribePluginResponse { PluginDescriptor plugin = 1; }

// ---------- plugin-backed indexes ----------

message PluginIndexDescriptor {
  string    table          = 1;
  string    name           = 2;
  string    plugin_name    = 3;
  bytes     plugin_config  = 4; // opaque to the engine
  KeySchema key_schema     = 5;
}

message CreateIndexRequest  { PluginIndexDescriptor descriptor = 1; }
message CreateIndexResponse { PluginIndexDescriptor descriptor = 1; }

message DescribeIndexRequest  { string table = 1; string name = 2; }
message DescribeIndexResponse { PluginIndexDescriptor descriptor = 1; }

message RebuildIndexRequest  { string table = 1; string name = 2; }
message RebuildIndexResponse { int64  items_indexed = 1; }

// ---------- explain ----------

message ExplainRequest {
  string table     = 1;
  string predicate = 2;
  string format    = 3; // "text" | "json"
}
message ExplainResponse {
  string plan = 1;
}

// ---------- top-k ----------

message TopKRequest {
  string                       table             = 1;
  string                       distance_operator = 2; // e.g. "cosine"
  string                       field             = 3; // attribute compared against
  AttributeValue               target            = 4;
  int32                        k                 = 5;
}
message TopKRow {
  Item   item     = 1;
  double distance = 2;
}
message TopKResponse {
  repeated TopKRow rows = 1;
}

// ---------- cohort ----------

message CohortCreateRequest {
  string table        = 1;
  string cohort       = 2;
  string field        = 3; // numeric attribute to bitmap
  string filter       = 4; // optional WHERE-like predicate (DDB condition subset)
  map<string, AttributeValue> binds = 5;
}
message CohortCreateResponse {
  int64 members = 1;
}

message CohortEstimateRequest {
  string table = 1;
  string field = 2;
  string filter = 3;
  map<string, AttributeValue> binds = 4;
}
message CohortEstimateResponse {
  double approximate_count = 1;
}

// ---------- audience ----------

message GeoAudienceRequest {
  string table          = 1;
  string index          = 2; // geohash index name; defaults to "loc_geo" when empty
  double lat            = 3;
  double lon            = 4;
  double radius_meters  = 5;
  int32  limit          = 6;
}

message DedupRequest {
  string scope       = 1;
  string key         = 2;
  int64  ttl_seconds = 3;
}
message DedupResponse {
  bool allowed = 1;
}

message FreqCapRequest {
  string scope          = 1;
  string key            = 2;
  int32  limit          = 3;
  int64  window_seconds = 4;
}
message FreqCapResponse {
  bool allowed = 1;
}

message AggregateRequest {
  string          table          = 1;
  repeated string group_by       = 2;
  repeated string metrics        = 3;
  int32           min_group_size = 4;
}
message AggregateRow {
  map<string, string> group_key = 1;
  map<string, double> counts    = 2;
  int32               members   = 3;
}
message AggregateResponse {
  repeated AggregateRow rows = 1;
}

message SqlRequest  { string query = 1; }
message SqlResponse {
  int64         affected_rows = 1;
  repeated Item rows          = 2;
}

// ---------- attribute model ----------

message AttributeValue {
  oneof value {
    string         s        = 1;
    string         n        = 2; // canonical decimal text
    bytes          b        = 3;
    bool           bool_val = 4;
    bool           null_val = 5; // true means "explicit null"
    StringSet      ss       = 6;
    StringSet      ns       = 7;
    BinarySet      bs       = 8;
    List           l        = 9;
    Map            m        = 10;
  }
}

message StringSet { repeated string         values = 1; }
message BinarySet { repeated bytes          values = 1; }
message List      { repeated AttributeValue values = 1; }
message Map       { map<string, AttributeValue> values = 1; }

message Item {
  map<string, AttributeValue> attributes = 1;
}

// ---------- schema ----------

message KeySchema {
  string pk = 1;
  string sk = 2;
}

message GSIDescriptor {
  string             name        = 1;
  KeySchema          key_schema  = 2;
  repeated string    projected   = 3;
}

message NumRange {
  double lo = 1;
  double hi = 2;
}

message SpatialIndexDescriptor {
  string             name       = 1;
  string             kind       = 2; // "geohash" | "zorder"
  repeated string    attributes = 3;
  int32              precision  = 4;
  repeated NumRange  ranges     = 5;
}

message TableDescriptor {
  string                          name             = 1;
  KeySchema                       key_schema       = 2;
  repeated GSIDescriptor          gsis             = 3;
  repeated SpatialIndexDescriptor spatial_indexes  = 4;
}

// ---------- schema rpcs ----------

message CreateTableRequest  { TableDescriptor descriptor = 1; }
message CreateTableResponse { TableDescriptor descriptor = 1; }

message DescribeTableRequest  { string          name       = 1; }
message DescribeTableResponse { TableDescriptor descriptor = 1; }

message ListTablesRequest  {}
message ListTablesResponse { repeated TableDescriptor tables = 1; }

message DropTableRequest  { string name = 1; }
message DropTableResponse {}

// TTL specification mirrors aws dynamodb update-time-to-live.
message TimeToLiveSpecification {
  bool   enabled        = 1;
  string attribute_name = 2; // ignored when enabled = false
}

message UpdateTimeToLiveRequest {
  string                  table_name                 = 1;
  TimeToLiveSpecification time_to_live_specification = 2;
}
message UpdateTimeToLiveResponse {
  TimeToLiveSpecification time_to_live_specification = 1;
}

message DescribeTimeToLiveRequest  { string table_name = 1; }
message DescribeTimeToLiveResponse {
  // status mirrors aws dynamodb: "ENABLED" | "DISABLED".
  string status         = 1;
  string attribute_name = 2;
}

// ---------- item rpcs ----------

message PutItemRequest {
  string                       table     = 1;
  map<string, AttributeValue>  item      = 2;
  // Optional ConditionExpression and bind variables.
  string                       condition = 3;
  map<string, AttributeValue>  binds     = 4;
}
message PutItemResponse {}

enum Consistency {
  CONSISTENCY_UNSPECIFIED = 0;
  CONSISTENCY_EVENTUAL    = 1; // local read on whichever node served the call
  CONSISTENCY_STRONG      = 2; // routed to the leader + barrier
}

message GetItemRequest {
  string                       table       = 1;
  map<string, AttributeValue>  key         = 2;
  Consistency                  consistency = 3;
}
message GetItemResponse {
  bool                         found = 1;
  map<string, AttributeValue>  item  = 2;
}

message DeleteItemRequest {
  string                       table     = 1;
  map<string, AttributeValue>  key       = 2;
  string                       condition = 3;
  map<string, AttributeValue>  binds     = 4;
}
message DeleteItemResponse {}

// UpdateItemRequest mirrors aws dynamodb update-item. The cefas server
// resolves #names + :values inline and dispatches the resulting SQL
// UPDATE through the standard SQL executor — that path already does
// SET / ADD / REMOVE / DELETE with GSI/LSI/TTL maintenance.
enum ReturnValues {
  RETURN_VALUES_UNSPECIFIED = 0;
  RETURN_VALUES_NONE        = 1;
  RETURN_VALUES_ALL_NEW     = 2;
  RETURN_VALUES_ALL_OLD     = 3;
  RETURN_VALUES_UPDATED_NEW = 4;
  RETURN_VALUES_UPDATED_OLD = 5;
}

message UpdateItemRequest {
  string                       table                       = 1;
  map<string, AttributeValue>  key                         = 2;
  string                       update_expression           = 3;
  string                       condition_expression        = 4;
  map<string, string>          expression_attribute_names  = 5;
  map<string, AttributeValue>  expression_attribute_values = 6;
  ReturnValues                 return_values               = 7;
}

message UpdateItemResponse {
  // Set when return_values selects an OLD / NEW image.
  map<string, AttributeValue> attributes = 1;
}

// ---------- batch ----------

message BatchWriteOp {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_PUT         = 1;
    KIND_DELETE      = 2;
  }
  Kind                         kind = 1;
  map<string, AttributeValue>  item = 2; // for PUT
  map<string, AttributeValue>  key  = 3; // for DELETE
}

message BatchWriteItemRequest {
  string                table = 1;
  repeated BatchWriteOp ops   = 2;
}
message BatchWriteItemResponse {}

message BatchGetItemRequest {
  string                              table = 1;
  // Each entry is the set of key attributes for one item. Order is
  // preserved in the response.
  repeated KeyMap                     keys  = 2;
}
message KeyMap { map<string, AttributeValue> attributes = 1; }

message BatchGetItemResponse {
  // Entries align with the request's `keys` index. A missing item
  // returns an empty Item (attributes map is empty).
  repeated Item items = 1;
}

// ---------- transactions (single-shard v1) ----------

// A TransactWriteOp is one entry in TransactWriteItems. Exactly one of
// put / delete / condition_check is set. The condition_expression
// (with its binds) applies to every kind. Update is not yet supported
// — callers should compose Put + ConditionCheck or use UpdateItem
// outside the transaction.
message TransactWriteOp {
  message Put {
    string                       table = 1;
    map<string, AttributeValue>  item  = 2;
  }
  message Delete {
    string                       table = 1;
    map<string, AttributeValue>  key   = 2;
  }
  message ConditionCheck {
    string                       table = 1;
    map<string, AttributeValue>  key   = 2;
  }
  oneof op {
    Put            put             = 1;
    Delete         delete          = 2;
    ConditionCheck condition_check = 3;
  }
  string                       condition_expression = 4;
  map<string, AttributeValue>  binds                = 5;
}

message TransactWriteItemsRequest {
  repeated TransactWriteOp ops = 1;
}
message TransactWriteItemsResponse {}

message TransactGet {
  string                       table = 1;
  map<string, AttributeValue>  key   = 2;
}

message TransactGetItemsRequest {
  repeated TransactGet items = 1;
}
message TransactGetItemsResponse {
  // Entries align with the request's `items` index. A missing item
  // returns an empty Item (attributes map is empty).
  repeated Item items = 1;
}

// ---------- streaming query / scan ----------

message QueryRequest {
  string         table        = 1;
  string         index_name   = 2; // empty → primary; otherwise GSI name
  AttributeValue pk_value     = 3;
  AttributeValue sk_low       = 4;
  AttributeValue sk_high      = 5;
  int32          limit        = 6;
  Consistency    consistency  = 7;
}

// ScanRequest streams every primary item in `table`. FilterExpression
// is evaluated server-side using the same grammar as ConditionExpression
// on PutItem / DeleteItem (cefas DDB-condition subset, with `:bind`
// placeholders resolved from `binds`). Multi-shard deployments scatter
// the scan across every shard and merge the streams in arrival order
// (no global ordering guarantee).
message ScanRequest {
  string                       table             = 1;
  string                       filter_expression = 2;
  map<string, AttributeValue>  binds             = 3;
  int32                        limit             = 4;
  Consistency                  consistency       = 5;
}

// ---------- spatial ----------

message BBox {
  double min_lat = 1;
  double min_lon = 2;
  double max_lat = 3;
  double max_lon = 4;
}

message Radius {
  double lat    = 1;
  double lon    = 2;
  double meters = 3;
}

message ZBBox {
  repeated uint32 lo = 1;
  repeated uint32 hi = 2;
}

message SpatialQueryRequest {
  string table      = 1;
  string index_name = 2;
  oneof  shape {
    BBox   bbox     = 3;
    Radius radius   = 4;
    ZBBox  z        = 5;
  }
  int32 limit       = 6;
}

// ---------- cluster ----------

message ClusterStatusRequest  {}
message ClusterStatusResponse {
  string mode               = 1; // "single-node" | "raft"
  bool   is_leader          = 2;
  string self_id            = 3;
  string bind_addr          = 4;
  string leader_http        = 5;
  uint64 routing_epoch      = 6;
  uint64 placement_version  = 7;
  int32  shard_count        = 8;
  string placement_strategy = 9;
  repeated ShardPlacement shards = 10;
  repeated NodeDescriptor nodes  = 11;
}

message TokenRange {
  uint64 start = 1;
  uint64 end   = 2;
}

message NodeCapacity {
  int32  weight       = 1;
  int32  cpu          = 2;
  uint64 memory_bytes = 3;
  uint64 disk_bytes   = 4;
  string zone         = 5;
  repeated string tags = 6;
}

message NodeDescriptor {
  string id             = 1;
  string raft_addr      = 2;
  string http_addr      = 3;
  string state          = 4;
  NodeCapacity capacity = 5;
  int64  last_seen_unix = 6;
}

message ShardPlacement {
  uint32 id              = 1;
  repeated TokenRange ranges = 2;
  string state           = 3;
  uint64 epoch           = 4;
  repeated string voters = 5;
  repeated string non_voters = 6;
  string leader_hint     = 7;
}

message AddVoterRequest {
  string id          = 1;
  string addr        = 2;
  int32  timeout_ms  = 3;
  optional uint32 shard_id = 4;
  bool   all_shards  = 5;
}
message AddVoterResponse {}

message RemoveServerRequest {
  string id          = 1;
  int32  timeout_ms  = 2;
  optional uint32 shard_id = 3;
  bool   all_shards  = 4;
}
message RemoveServerResponse {}

message PlacementCatalog {
  uint64 version       = 1;
  uint64 epoch         = 2;
  string strategy      = 3;
  repeated ShardPlacement shards = 4;
  repeated NodeDescriptor nodes  = 5;
  int64  updated_at_unix = 6;
}

message PlanPlacementRequest {
  string operation        = 1; // "split" | "move" | "drain"
  uint32 shard_id         = 2;
  optional uint64 split_token = 3;
  optional uint32 new_shard_id = 4;
  string source_node      = 5;
  string target_node      = 6;
  repeated string target_nodes = 7;
  repeated string target_voters = 8;
  string node_id          = 9;
  int32  min_voters       = 10;
}

message PlacementPlanStep {
  string action = 1;
  optional uint32 shard_id = 2;
  string node_id = 3;
  string addr    = 4;
  string detail  = 5;
}

message PlacementPlan {
  string operation = 1;
  uint64 before_epoch = 2;
  uint64 after_epoch  = 3;
  PlacementCatalog before = 4;
  PlacementCatalog after  = 5;
  repeated PlacementPlanStep steps = 6;
  repeated string warnings = 7;
  bool requires_data_copy = 8;
  bool requires_restart = 9;
  bool apply_supported = 10;
}

message PlanPlacementResponse {
  PlacementPlan plan = 1;
}

message ApplyPlacementRequest {
  PlacementPlan plan = 1;
  uint64 expected_epoch = 2;
  int32  timeout_ms = 3;
}

message PlacementApplyStep {
  string action = 1;
  optional uint32 shard_id = 2;
  string node_id = 3;
  string status  = 4;
  string detail  = 5;
}

message PlacementApplyResult {
  string operation = 1;
  uint64 before_epoch = 2;
  uint64 after_epoch  = 3;
  repeated PlacementApplyStep steps = 4;
  PlacementCatalog placement = 5;
}

message ApplyPlacementResponse {
  PlacementApplyResult result = 1;
}
