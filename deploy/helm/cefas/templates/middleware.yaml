{{- if and .Values.ingress.enabled .Values.ingress.stripPrefix.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "cefas.fullname" . }}-strip-prefix
  labels:
    {{- include "cefas.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ .Values.ingress.prefix | quote }}
{{- end }}
