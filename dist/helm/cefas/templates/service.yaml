apiVersion: v1
kind: Service
metadata:
  name: {{ include "cefas.fullname" . }}
  labels:
    {{- include "cefas.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cefas.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.http }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpc }}
      targetPort: grpc
---
# Headless service used by the StatefulSet so peers can discover each
# other through cefas-0.{{ include "cefas.headless" . }}, ...
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cefas.headless" . }}
  labels:
    {{- include "cefas.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "cefas.selectorLabels" . | nindent 4 }}
  ports:
    - name: mux
      port: {{ .Values.service.mux }}
      targetPort: mux
    - name: http
      port: {{ .Values.service.http }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpc }}
      targetPort: grpc
