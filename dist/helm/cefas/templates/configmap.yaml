apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cefas.fullname" . }}-config
  labels:
    {{- include "cefas.labels" . | nindent 4 }}
data:
  cefas.yaml: |
    data: /var/lib/cefas
    http:
      addr: ":{{ .Values.service.http }}"
    lifecycle:
      shutdownGracePeriod: {{ .Values.lifecycle.shutdownGracePeriod | quote }}
      drainDelay: {{ .Values.lifecycle.drainDelay | quote }}
      leadershipTransferTimeout: {{ .Values.lifecycle.leadershipTransferTimeout | quote }}
    grpc:
      addr: ":{{ .Values.service.grpc }}"
      reflection: true
    storage:
      fsyncOnCommit: {{ .Values.cluster.fsyncOnCommit }}
      streamRetentionInterval: {{ .Values.storage.streamRetentionInterval | quote }}
      streamRetentionCleanupBatchSize: {{ .Values.storage.streamRetentionCleanupBatchSize }}
    cluster:
      shards: {{ .Values.cluster.shards }}
      replicationFactor: {{ include "cefas.resolvedReplicationFactor" . }}
      muxAddr: ":{{ .Values.service.mux }}"
      bootstrap: {{ .Values.cluster.bootstrap }}
      {{- $replicas := include "cefas.resolvedReplicaCount" . | int }}
      {{- if gt $replicas 1 }}
      peers:
        {{- range $i := until $replicas }}
        {{ printf "%s-%d" (include "cefas.fullname" $) $i | quote }}: {{ printf "%s:%v" (include "cefas.podDNS" (list $ $i)) $.Values.service.mux | quote }}
        {{- end }}
      httpPeers:
        {{- range $i := until $replicas }}
        {{ printf "%s-%d" (include "cefas.fullname" $) $i | quote }}: {{ printf "http://%s:%v" (include "cefas.podDNS" (list $ $i)) $.Values.service.http | quote }}
        {{- end }}
      grpcPeers:
        {{- range $i := until $replicas }}
        {{ printf "%s-%d" (include "cefas.fullname" $) $i | quote }}: {{ printf "%s:%v" (include "cefas.podDNS" (list $ $i)) $.Values.service.grpc | quote }}
        {{- end }}
      {{- end }}
    metrics:
      enabled: {{ .Values.metrics.enabled }}
    identity:
      jwksUrl: {{ .Values.identity.jwksUrl | quote }}
      issuer: {{ .Values.identity.issuer | quote }}
      audience: {{ .Values.identity.audience | quote }}
    tracing:
      endpoint: {{ .Values.tracing.endpoint | quote }}
      insecure: {{ .Values.tracing.insecure }}
      sampleRate: {{ .Values.tracing.sampleRate }}
