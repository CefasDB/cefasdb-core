apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cefas.fullname" . }}
  labels:
    {{- include "cefas.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "cefas.headless" . }}
  replicas: {{ include "cefas.resolvedReplicaCount" . }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "cefas.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cefas.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cefas.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if and .Values.resilience.enabled .Values.resilience.scheduling.antiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.resilience.scheduling.antiAffinity.weight }}
              podAffinityTerm:
                topologyKey: {{ .Values.resilience.scheduling.antiAffinity.topologyKey | quote }}
                labelSelector:
                  matchLabels:
                    {{- include "cefas.selectorLabels" . | nindent 20 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      {{- else if and .Values.resilience.enabled .Values.resilience.scheduling.topologySpread.enabled }}
      topologySpreadConstraints:
        {{- range .Values.resilience.scheduling.topologySpread.topologyKeys }}
        - maxSkew: {{ $.Values.resilience.scheduling.topologySpread.maxSkew }}
          topologyKey: {{ . | quote }}
          whenUnsatisfiable: {{ $.Values.resilience.scheduling.topologySpread.whenUnsatisfiable | quote }}
          labelSelector:
            matchLabels:
              {{- include "cefas.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.lifecycle.terminationGracePeriodSeconds }}
      containers:
        - name: cefas
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-config"
            - "/etc/cefas/cefas.yaml"
            - "-raft-id"
            - "$(POD_NAME)"
            {{- if .Values.raftIdentity.lease.enabled }}
            - "-raft-identity-lease-backend"
            - {{ .Values.raftIdentity.lease.backend | quote }}
            - "-raft-identity-lease-name"
            - "{{ default (include "cefas.fullname" .) .Values.raftIdentity.lease.namePrefix }}-$(POD_NAME)"
            - "-raft-identity-lease-namespace"
            - "$(POD_NAMESPACE)"
            - "-raft-identity-lease-ttl"
            - {{ .Values.raftIdentity.lease.ttl | quote }}
            - "-raft-identity-lease-renew-interval"
            - {{ .Values.raftIdentity.lease.renewInterval | quote }}
            {{- else }}
            - "-raft-identity-lease-backend"
            - "off"
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: http
              containerPort: {{ .Values.service.http }}
            - name: grpc
              containerPort: {{ .Values.service.grpc }}
            - name: mux
              containerPort: {{ .Values.service.mux }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- include "cefas.startupProbe" . | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/cefas
            - name: config
              mountPath: /etc/cefas
              readOnly: true
          resources:
            {{- include "cefas.dbResources" . | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "cefas.fullname" . }}-config
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "cefas.selectorLabels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
