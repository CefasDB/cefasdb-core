# cefas Helm chart values.
#
# Defaults bring up a single replica StatefulSet on hostPort-style
# Services with persistent storage. Multi-node clusters require
# replicaCount ≥ 3 and the multi-Raft flags below.

image:
  repository: ghcr.io/cefasdb/cefasdb
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""

manager:
  enabled: true
  replicaCount: 2
  repairMode: observe
  interval: 30s
  timeout: 30s
  leaderLeaseTTL: 30s
  approveFencing: false
  auditLog: /tmp/cefas-manager-audit.jsonl
  tokenSecretName: ""
  tokenSecretKey: token
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

persistence:
  enabled: true
  size: 20Gi
  storageClass: ""

service:
  type: ClusterIP
  http: 8080
  grpc: 9090
  mux: 9100
  headless:
    # Required for StatefulSet peer bootstrap: Pods can resolve each
    # other before readiness passes. Client traffic uses the regular
    # service above, which does not publish non-ready endpoints.
    publishNotReadyAddresses: true

lifecycle:
  terminationGracePeriodSeconds: 30
  shutdownGracePeriod: 25s
  drainDelay: 2s
  leadershipTransferTimeout: 5s

# Multi-Raft sharding. shards>1 turns on the mux transport.
cluster:
  shards: 1
  bootstrap: true
  fsyncOnCommit: false

# Guards each raft-id with a persistent lease so a stale process cannot
# keep serving after Kubernetes starts a replacement with the same id.
raftIdentity:
  lease:
    enabled: true
    backend: kubernetes
    ttl: 30s
    renewInterval: 10s
    namePrefix: ""

# Optional identity provider (Tikti JWKS).
identity:
  jwksUrl: ""
  issuer: ""
  audience: ""

# Optional OTLP/gRPC tracing collector.
tracing:
  endpoint: ""
  insecure: true
  sampleRate: 1.0

# Metrics endpoint always exposed unless explicitly disabled.
metrics:
  enabled: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  prefix: /
  stripPrefix:
    enabled: false
  hosts: []
  tls: []

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

securityContext:
  runAsNonRoot: true
  runAsUser: 65532

livenessProbe:
  httpGet:
    path: /livez
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 1

startupProbe:
  httpGet:
    path: /startupz
    port: 8080
  failureThreshold: 30
  periodSeconds: 2
