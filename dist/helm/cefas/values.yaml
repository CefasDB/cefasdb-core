# cefas Helm chart values.
#
# Defaults bring up a single replica StatefulSet for local development.
# Set resilience.enabled=true for an RF=3-safe Kubernetes profile.

image:
  repository: ghcr.io/cefasdb/cefasdb
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""

resilience:
  enabled: false
  # Used when resilience.enabled=true. The rendered StatefulSet uses
  # max(replicaCount, resilience.replicas) so `--set resilience.enabled=true`
  # is enough to render three database Pods.
  replicas: 3
  replicationFactor: 3
  requirePersistentStorage: true
  allowEphemeralStorage: false
  startupProbe:
    # 120*2s gives recovering Pods up to four minutes for bootstrap,
    # log replay, and shard startup before kubelet restarts the process.
    failureThreshold: 120
    periodSeconds: 2
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
    minAvailable: ""
  scheduling:
    antiAffinity:
      enabled: true
      topologyKey: kubernetes.io/hostname
      weight: 100
    topologySpread:
      enabled: true
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
      topologyKeys:
        - kubernetes.io/hostname
        - cefasdb.io/failure-domain

manager:
  enabled: true
  replicaCount: 2
  repairMode: observe
  interval: 30s
  timeout: 30s
  leaderLeaseTTL: 30s
  approveFencing: false
  auditLog: /tmp/cefas-manager-audit.jsonl
  tokenSecretName: ""
  tokenSecretKey: token
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

resourcePolicy:
  # Database performance tests and dedicated DB nodes usually should not
  # use CPU limits; set this true to omit resources.limits.cpu while
  # retaining memory limits.
  disableCPULimits: false
  requireMemoryLimit: true

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

persistence:
  enabled: true
  size: 20Gi
  storageClass: ""

service:
  type: ClusterIP
  http: 8080
  grpc: 9090
  mux: 9100
  headless:
    # Required for StatefulSet peer bootstrap: Pods can resolve each
    # other before readiness passes. Client traffic uses the regular
    # service above, which does not publish non-ready endpoints.
    publishNotReadyAddresses: true

lifecycle:
  terminationGracePeriodSeconds: 30
  shutdownGracePeriod: 25s
  drainDelay: 2s
  leadershipTransferTimeout: 5s

# Multi-Raft sharding. shards>1 turns on the mux transport.
cluster:
  shards: 1
  # 0 means "use every peer". With resilience.enabled=true this resolves
  # to resilience.replicationFactor unless explicitly set to >=3.
  replicationFactor: 0
  bootstrap: true
  fsyncOnCommit: false

# Guards each raft-id with a persistent lease so a stale process cannot
# keep serving after Kubernetes starts a replacement with the same id.
raftIdentity:
  lease:
    enabled: true
    backend: kubernetes
    ttl: 30s
    renewInterval: 10s
    namePrefix: ""

# Optional identity provider (Tikti JWKS).
identity:
  jwksUrl: ""
  issuer: ""
  audience: ""

# Optional OTLP/gRPC tracing collector.
tracing:
  endpoint: ""
  insecure: true
  sampleRate: 1.0

# Metrics endpoint always exposed unless explicitly disabled.
metrics:
  enabled: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  prefix: /
  stripPrefix:
    enabled: false
  hosts: []
  tls: []

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

securityContext:
  runAsNonRoot: true
  runAsUser: 65532

livenessProbe:
  httpGet:
    path: /livez
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 1

startupProbe:
  httpGet:
    path: /startupz
    port: 8080
  failureThreshold: 30
  periodSeconds: 2
